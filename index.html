<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {

    margin:0;

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:#ffffff;

    font-family:Georgia, serif;

}

.quote-container {

    position:relative;

    max-width:750px;

    padding:20px;

}

.quote-mark {

    position:absolute;

    top:-45px;

    left:-40px;

    font-size:320px;

    color:rgba(0,0,0,0.08);

    font-family:Georgia, serif;

    line-height:1;

    user-select:none;

}

#quote {

    position:relative;

    z-index:1;

    font-size:19px;

    font-weight:bold;

    text-align:center;

    line-height:1.15;

    color:#222222;

}

</style>

</head>

<body>

<div class="quote-container">

    <div class="quote-mark">
        ❝
    </div>

    <div id="quote">
        Loading...
    </div>

</div>

<script>

fetch("Quotes List.html")

.then(response => response.text())

.then(data => {

    const parser = new DOMParser();

    const documentData = parser.parseFromString(
        data,
        "text/html"
    );

    const quotes = [
        ...documentData.querySelectorAll("li")
    ].map(
        quote => quote.textContent
    );

    // Pick one quote per day

    const today = new Date();

    const start = new Date(
        today.getFullYear(),
        0,
        0
    );

    const dayNumber = Math.floor(
        (today - start) / 86400000
    );

    const dailyQuote =
        quotes[dayNumber % quotes.length];

    document.getElementById("quote")
        .textContent = dailyQuote;

})

.catch(error => {
    document.getElementById("quote").textContent = "Unable to load quote.";
    console.error(error);
});

</script>

</body>

</html>
